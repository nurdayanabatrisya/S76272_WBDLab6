<!DOCTYPE html>
<html>
<body>
    <h2>User Registration</h2>
    <form action="processUser.jsp" method="POST">
        Username: <input type="text" name="username" maxlength="15" required><br><br>

    </form>
    <br><a href="login.jsp">Already registered? Login here</a>
